name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Mechanizes the PR-template "node --check passes on touched files" box:
      # syntax-checks every src/**/*.js so a parse error can't reach a browser.
      - name: Syntax check (node --check)
        run: npm run check
      # Pure-logic unit tests (spawn solver, math). No browser, no deps.
      - name: Unit tests
        run: npm test
